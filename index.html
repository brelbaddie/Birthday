<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);color:#fff}
.container{width:100%;display:flex;justify-content:center}
.card{width:90%;max-width:700px;padding:40px;border-radius:25px;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);text-align:center;box-shadow:0 15px 35px rgba(0,0,0,.2)}
.hidden{display:none}
h1{font-family:Pacifico;font-size:54px;margin-bottom:15px} h2{margin:10px 0} p{line-height:1.8;min-height:130px;white-space:pre-line}
button{margin-top:20px;padding:14px 34px;border:none;border-radius:40px;font-size:18px;color:#ff4d88;background:#fff;cursor:pointer;animation:pulse 1.6s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.balloon,.heart,.confetti,.spark{position:fixed;pointer-events:none}
.balloon{bottom:-80px;font-size:42px;animation:fly linear forwards}
@keyframes fly{to{transform:translateY(-120vh)}}
.heart{top:-30px;animation:fall 6s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
.confetti{width:10px;height:10px;animation:conf 4s linear forwards}
@keyframes conf{to{transform:translateY(110vh) rotate(720deg)}}
.spark{font-size:28px;animation:boom 1s ease-out forwards}
@keyframes boom{to{transform:scale(3);opacity:0}}
img{width:180px;animation:float 2s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-10px)}}
</style></head><body>
<div class="container">
<div class="card" id="welcome">
<h1>🎁</h1><h2>I have something for u...</h2>
<p>Click the button below, okay? ❤️</p>
<button onclick="openGift()">Open the Gift</button>
</div>
<div class="card hidden" id="gift">
<h1>🎂 Happy Birthday!</h1>
<img src="https://cdn-icons-png.flaticon.com/512/4392/4392522.png">
<h2>For u❤️</h2>
<p id="typing"></p>
</div></div>
<audio id="music" loop>
<source src="happybirthday.mp3" type="audio/mpeg">
</audio>
<script>
const msg=`Happy Birthday, My Favorite Person! 🎂🤍

Akhirnya hari yang aku tunggu tunggu datang juga. Jujur, aku sudah tidak sabar ingin mengucapkan ini sejak lama, karena hari ini adalah hari di mana seseorang yang paling berharga dalam hidupku bertambah usia.

Terima kasih sudah lahir ke dunia. Mungkin terdengar sederhana, tapi aku benar-benar bersyukur karena semesta mempertemukanku dengan seseorang sebaik, sehangat, dan seistimewa kamu.

Kamu mungkin tidak sadar, tapi kehadiranmu membawa banyak kebahagiaan dalam hidupku. Kamu selalu punya cara untuk membuat hari-hariku terasa lebih ringan, membuatku tersenyum saat keadaan sedang tidak baik-baik saja, dan membuatku merasa bahwa aku tidak sendirian.

Di umurmu yang baru ini, aku tidak berharap kamu menjadi seseorang yang sempurna. Aku hanya berharap kamu selalu sehat, selalu kuat menghadapi apa pun yang datang, selalu dikelilingi orang-orang yang tulus menyayangimu, dan semoga semua mimpi yang selama ini kamu perjuangkan bisa terwujud satu per satu.

Kalau nanti ada hari-hari yang terasa berat, jangan lupa istirahat. Tidak apa-apa berjalan pelan, yang penting jangan berhenti. Aku percaya kamu mampu melewati semuanya, karena aku tahu betapa hebatnya kamu.

Terima kasih sudah menjadi rumah yang nyaman, teman bercerita, tempatku pulang, dan alasan mengapa banyak hari terasa lebih indah.

Semoga di setiap langkahmu selalu ada kebahagiaan. Semoga setiap doa yang belum sempat terkabul diganti dengan sesuatu yang jauh lebih baik. Dan semoga Tuhan selalu menjaga kamu, di mana pun kamu berada.

Terima kasih sudah menjadi orang favoritku, tempat ternyamanku, dan alasan mengapa aku percaya bahwa dicintai dengan tulus adalah hal yang nyata.
I love u more than words could ever explain.
Please, enjoy ur special day...
Karena hari ini, dunia sedang merayakan seseorang yang sangat berharga bagiku.
Happy Birthday, My Favorite Person. 🤍`;

function openGift(){
welcome.classList.add('hidden');
gift.classList.remove('hidden');
music.play().catch(()=>{});
typeWriter(); balloons(); hearts(); confetti(); fireworks();
}
function typeWriter(){let i=0; let t=document.getElementById('typing');
(function w(){if(i<msg.length){t.textContent+=msg[i++];setTimeout(w,35);}})();}
function balloons(){for(let i=0;i<18;i++){let b=document.createElement('div');b.className='balloon';b.textContent='🎈';b.style.left=Math.random()*100+'vw';b.style.animationDuration=(6+Math.random()*5)+'s';document.body.appendChild(b);}}
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤️';h.style.left=Math.random()*100+'vw';h.style.fontSize=(18+Math.random()*18)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),6500)},350);
function confetti(){for(let i=0;i<180;i++){let c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.top='-20px';c.style.background='hsl('+Math.random()*360+',100%,60%)';c.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4500);}}
function fireworks(){for(let i=0;i<40;i++){let s=document.createElement('div');s.className='spark';s.textContent='✨';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*80+'vh';document.body.appendChild(s);setTimeout(()=>s.remove(),1000);}}
</script></body></html>
